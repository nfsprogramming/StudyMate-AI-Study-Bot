<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI Pro - Light Client</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--text);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            background: #020617;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button.btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        button.btn-primary:hover {
            background: var(--primary-hover);
        }

        button.btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #chat-history {
            height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: #020617;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.9375rem;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--border);
            color: var(--text);
            border-bottom-left-radius: 0.25rem;
        }

        #quiz-results {
            margin-top: 1.5rem;
        }
        
        .quiz-question {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>StudyMate AI Pro</h1>
            <div class="status-badge">
                <span style="font-size: 1.5rem;">•</span> Backend Connected
            </div>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Lightweight Client</p>
        </header>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload')">1. Upload PDF</button>
                <button class="tab" onclick="switchTab('chat')">2. AI Chat</button>
                <button class="tab" onclick="switchTab('quiz')">3. Generate Quiz</button>
            </div>

            <!-- Upload Section -->
            <div id="upload-section">
                <div class="form-group">
                    <label>Upload Study Material (PDF)</label>
                    <input type="file" id="pdf-file" accept=".pdf" />
                </div>
                <button class="btn-primary" onclick="uploadDetails()" id="upload-btn">Upload & Process</button>
                <div id="upload-status" style="margin-top: 1rem; color: var(--text-muted);"></div>
            </div>

            <!-- Chat Section -->
            <div id="chat-section" class="hidden">
                <div id="chat-history">
                    <div class="message bot">Hello! Upload a PDF first, then ask me anything about it.</div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="chat-input" placeholder="Ask a question..." onkeypress="checkEnter(event)">
                    <button class="btn-primary" style="width: auto;" onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- Quiz Section -->
            <div id="quiz-section" class="hidden">
                <div class="form-group">
                    <label>Number of Questions</label>
                    <select id="quiz-count">
                        <option value="3">3 Questions</option>
                        <option value="5">5 Questions</option>
                        <option value="10">10 Questions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Difficulty</label>
                    <select id="quiz-difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="generateQuiz()" id="quiz-btn">Generate Quiz</button>
                <div id="quiz-container" style="margin-top: 2rem;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[['upload', 'chat', 'quiz'].indexOf(tab)].classList.add('active');
            
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('chat-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.add('hidden');
            
            document.getElementById(`${tab}-section`).classList.remove('hidden');
        }

        async function uploadDetails() {
            const fileInput = document.getElementById('pdf-file');
            const file = fileInput.files[0];
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');

            if (!file) {
                alert('Please select a PDF file first.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            btn.disabled = true;
            btn.textContent = "Uploading...";
            status.textContent = "Processing PDF...";

            try {
                const res = await fetch(`${API_URL}/api/upload-pdf`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    status.textContent = `✅ Successfully uploaded: ${data.filename} (${data.pages} pages)`;
                    status.style.color = '#34d399';
                } else {
                    throw new Error(data.detail || 'Upload failed');
                }
            } catch (e) {
                status.textContent = `❌ Error: ${e.message}`;
                status.style.color = '#f87171';
            } finally {
                btn.disabled = false;
                btn.textContent = "Upload & Process";
            }
        }

        function checkEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const history = document.getElementById('chat-history');

            if (!text) return;

            // Add user message
            history.innerHTML += `<div class="message user">${text}</div>`;
            input.value = '';
            history.scrollTop = history.scrollHeight;

            try {
                const res = await fetch(`${API_URL}/api/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Error');
                }

                const data = await res.json();
                history.innerHTML += `<div class="message bot">${data.answer}</div>`;
            } catch (e) {
                console.error(e);
                history.innerHTML += `<div class="message bot" style="color: #f87171;">Error: ${e.message}. Did you upload a PDF?</div>`;
            }
            history.scrollTop = history.scrollHeight;
        }

        async function generateQuiz() {
            const count = parseInt(document.getElementById('quiz-count').value);
            const difficulty = document.getElementById('quiz-difficulty').value;
            const container = document.getElementById('quiz-container');
            const btn = document.getElementById('quiz-btn');

            btn.disabled = true;
            btn.textContent = "Generating AI Quiz...";
            container.innerHTML = '<div style="text-align:center; color: var(--text-muted);">Analyzing documents and generating questions...</div>';

            try {
                const res = await fetch(`${API_URL}/api/generate-quiz`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        num_questions: count,
                        difficulty: difficulty 
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Error');
                }

                const data = await res.json();
                renderQuiz(data.questions);
            } catch (e) {
                container.innerHTML = `<div style="color: #f87171;">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Generate Quiz";
            }
        }

        function renderQuiz(questions) {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            questions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                
                let optionsHtml = '';
                for (const [key, value] of Object.entries(q.options)) {
                    optionsHtml += `
                        <div style="margin: 0.5rem 0; padding: 0.5rem; background: #020617; border-radius: 0.5rem; cursor: pointer;" 
                             onclick="this.style.background = '${key === q.correct ? '#064e3b' : '#7f1d1d'}'; this.style.border = '1px solid ${key === q.correct ? '#34d399' : '#f87171'}'">
                            <strong>${key}:</strong> ${value}
                        </div>
                    `;
                }

                qDiv.innerHTML = `
                    <h3 style="margin-top:0;">${idx + 1}. ${q.question}</h3>
                    <div>${optionsHtml}</div>
                `;
                container.appendChild(qDiv);
            });
        }
    </script>
</body>
</html>
